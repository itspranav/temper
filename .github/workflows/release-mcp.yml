name: Release MCP

on:
  push:
    tags:
      - 'mcp-v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            package: temper-mcp-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            package: temper-mcp-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-08
          targets: ${{ matrix.target }}

      - name: Install z3 (macOS)
        if: runner.os == 'macOS'
        run: brew install z3

      - name: Install z3 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libz3-dev

      - name: Build
        run: cargo build -p temper-cli --release --target ${{ matrix.target }}

      - name: Copy binary
        run: |
          mkdir -p packages/${{ matrix.package }}/bin
          cp target/${{ matrix.target }}/release/temper packages/${{ matrix.package }}/bin/temper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy artifacts to packages
        run: |
          for pkg in temper-mcp-darwin-arm64 temper-mcp-linux-x64; do
            cp -r artifacts/$pkg/* packages/$pkg/
            chmod +x packages/$pkg/bin/*
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in temper-mcp-darwin-arm64 temper-mcp-linux-x64; do
            cd packages/$pkg
            npm publish || echo "Failed to publish $pkg"
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/temper-mcp
          npm publish
