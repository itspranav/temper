# ReviewWorkflow Entity — I/O Automaton Specification
#
# A child workflow spawned by LeadPlan for code review.
# Supports approve, request changes, reject, and resubmit flows.

[automaton]
name = "ReviewWorkflow"
states = ["Pending", "InReview", "Approved", "ChangesRequested", "Rejected"]
initial = "Pending"

# --- Actions: Review Lifecycle ---

[[action]]
name = "Begin"
kind = "input"
from = ["Pending"]
to = "InReview"
hint = "Start the code review process."
effect = [{ type = "emit_event", event = "ReviewStarted" }]

[[action]]
name = "Approve"
kind = "input"
from = ["InReview"]
to = "Approved"
params = ["reviewer", "comments"]
hint = "Reviewer approves the change."
effect = [{ type = "emit_event", event = "ReviewApproved" }]

[[action]]
name = "RequestChanges"
kind = "input"
from = ["InReview"]
to = "ChangesRequested"
params = ["reviewer", "change_requests"]
hint = "Reviewer requests changes before approval."
effect = [{ type = "emit_event", event = "ChangesRequested" }]

[[action]]
name = "Reject"
kind = "input"
from = ["InReview"]
to = "Rejected"
params = ["reviewer", "reason"]
hint = "Reviewer rejects the change entirely."
effect = [{ type = "emit_event", event = "ReviewRejected" }]

[[action]]
name = "ReSubmit"
kind = "input"
from = ["ChangesRequested"]
to = "InReview"
hint = "Resubmit code after addressing requested changes."

# --- Safety Invariants ---

[[invariant]]
name = "ApprovedIsFinal"
when = ["Approved"]
assert = "no_further_transitions"

[[invariant]]
name = "RejectedIsFinal"
when = ["Rejected"]
assert = "no_further_transitions"
