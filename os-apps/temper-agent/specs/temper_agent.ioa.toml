# TemperAgent Entity — Spec-driven agent loop via IOA state machine.
#
# The agent turn cycle is expressed as state transitions with WASM integration
# triggers. No Rust while loop — the platform's dispatch pipeline drives
# iteration through callback chaining:
#   Thinking → (call_llm) → ProcessToolCalls → Executing → (run_tools) →
#   HandleToolResults → Thinking → ...
#
# Conversation history stored in TemperFS (conversation_file_id FK).
# Budget enforced via turn_count guard. Tools governed by Cedar.

[automaton]
name = "TemperAgent"
states = ["Created", "Provisioning", "Thinking", "Executing", "Completed", "Failed", "Cancelled"]
initial = "Created"

# --- State Variables ---

[[state]]
name = "prompt"
type = "string"
initial = ""

[[state]]
name = "model"
type = "string"
initial = "claude-sonnet-4-20250514"

[[state]]
name = "provider"
type = "string"
initial = "anthropic"

[[state]]
name = "conversation_file_id"
type = "string"
initial = ""

[[state]]
name = "workspace_id"
type = "string"
initial = ""

[[state]]
name = "pending_tool_calls"
type = "string"
initial = ""

[[state]]
name = "turn_count"
type = "counter"
initial = "0"

[[state]]
name = "max_turns"
type = "string"
initial = "20"

[[state]]
name = "input_tokens"
type = "counter"
initial = "0"

[[state]]
name = "output_tokens"
type = "counter"
initial = "0"

[[state]]
name = "cost_cents"
type = "string"
initial = "0"

[[state]]
name = "result"
type = "string"
initial = ""

[[state]]
name = "has_result"
type = "bool"
initial = "false"

[[state]]
name = "error_message"
type = "string"
initial = ""

[[state]]
name = "sandbox_url"
type = "string"
initial = ""

[[state]]
name = "sandbox_id"
type = "string"
initial = ""

[[state]]
name = "workdir"
type = "string"
initial = "/workspace"

[[state]]
name = "tools_enabled"
type = "string"
initial = "read,write,edit,bash"

[[state]]
name = "system_prompt"
type = "string"
initial = ""

[[state]]
name = "conversation"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Configure"
kind = "input"
from = ["Created"]
params = ["prompt", "model", "provider", "max_turns", "tools_enabled", "system_prompt", "workdir"]
hint = "Configure agent with task prompt, model, and tool settings."

[[action]]
name = "Provision"
kind = "input"
from = ["Created"]
to = "Provisioning"
hint = "Start sandbox provisioning. Triggers provision_sandbox WASM integration."
effect = [{ type = "trigger", name = "provision_sandbox" }]

[[action]]
name = "SandboxReady"
kind = "input"
from = ["Provisioning"]
to = "Thinking"
params = ["sandbox_url", "sandbox_id"]
hint = "Callback from sandbox provisioner. Sets sandbox connection and starts think loop."
effect = [{ type = "trigger", name = "call_llm" }]

[[action]]
name = "ProcessToolCalls"
kind = "input"
from = ["Thinking"]
to = "Executing"
params = ["pending_tool_calls", "conversation"]
hint = "LLM returned tool_use blocks. Transition to Executing and run tools."
effect = [{ type = "trigger", name = "run_tools" }]

[[action]]
name = "HandleToolResults"
kind = "input"
from = ["Executing"]
to = "Thinking"
params = ["pending_tool_calls", "conversation"]
hint = "Tool results received. Increment turn, transition to Thinking, and call LLM again."
effect = [
  { type = "increment", var = "turn_count" },
  { type = "trigger", name = "call_llm" }
]

[[action]]
name = "RecordTokenUsage"
kind = "input"
from = ["Thinking", "Executing"]
params = ["input_tokens", "output_tokens", "cost_cents"]
hint = "Record token consumption and cost for the current turn."

[[action]]
name = "RecordResult"
kind = "input"
from = ["Thinking"]
to = "Completed"
params = ["result", "conversation"]
hint = "LLM returned end_turn. Record the result and complete."
effect = [{ type = "set_bool", var = "has_result", value = "true" }]

[[action]]
name = "Fail"
kind = "input"
from = ["Created", "Provisioning", "Thinking", "Executing"]
to = "Failed"
params = ["error_message"]
hint = "Mark agent run as failed."

[[action]]
name = "Cancel"
kind = "input"
from = ["Created", "Provisioning", "Thinking", "Executing"]
to = "Cancelled"
hint = "Cancel agent execution."

# --- Invariants ---

[[invariant]]
name = "CompletedHasResult"
when = ["Completed"]
assert = "has_result"

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"

[[invariant]]
name = "CancelledIsFinal"
when = ["Cancelled"]
assert = "no_further_transitions"

[[invariant]]
name = "TurnCountNonNegative"
when = ["Created", "Provisioning", "Thinking", "Executing", "Completed", "Failed", "Cancelled"]
assert = "turn_count >= 0"

# --- Integrations ---

[[integration]]
name = "provision_sandbox"
trigger = "provision_sandbox"
type = "wasm"
module = "sandbox_provisioner"
on_failure = "Fail"

[integration.config]
temper_api_url = "http://localhost:3210"
sandbox_url = "http://localhost:9999"

[[integration]]
name = "call_llm"
trigger = "call_llm"
type = "wasm"
module = "llm_caller"
on_failure = "Fail"

[integration.config]
api_key = "{secret:anthropic_api_key}"
temper_api_url = "http://localhost:3210"
timeout_secs = "120"
max_response_bytes = "4194304"

[[integration]]
name = "run_tools"
trigger = "run_tools"
type = "wasm"
module = "tool_runner"
on_failure = "Fail"
