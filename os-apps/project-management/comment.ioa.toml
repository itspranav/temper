# Comment Entity — I/O Automaton Specification
#
# Discussion comment on an issue. Tracks which agent session left the comment
# so context can be traced back to specific CC/Codex runs.

[automaton]
name = "Comment"
states = ["Active", "Edited", "Deleted"]
initial = "Active"

# --- State Variables ---

[[state]]
name = "edit_count"
type = "counter"
initial = "0"

[[state]]
name = "issue_id"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Create"
kind = "input"
from = ["Active"]
params = ["issue_id", "body", "author_id", "agent_type", "session_id"]
hint = "Initialize comment. author_id: who wrote it. agent_type: claude-code, codex, haku, human. session_id: trace back to specific agent session."

[[action]]
name = "Edit"
kind = "input"
from = ["Active", "Edited"]
to = "Edited"
effect = "increment edit_count"
params = ["body"]
hint = "Edit the comment body."

[[action]]
name = "Delete"
kind = "input"
from = ["Active", "Edited"]
to = "Deleted"
hint = "Soft-delete the comment. Terminal state."

[[action]]
name = "React"
kind = "input"
from = ["Active", "Edited"]
params = ["emoji", "reactor_id"]
hint = "Add a reaction to the comment."

# --- Safety Invariants ---

[[invariant]]
name = "DeletedIsFinal"
when = ["Deleted"]
assert = "no_further_transitions"

[[invariant]]
name = "EditedHasEdits"
when = ["Edited"]
assert = "edit_count > 0"
