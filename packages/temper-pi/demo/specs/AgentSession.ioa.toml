# AgentSession Entity — I/O Automaton Specification
#
# Represents an individual agent's work session within a pipeline.
# Tracks assignment, execution, blocking, and completion of a single
# unit of work. Agents cycle through sessions as they pick up and
# finish work items.

[automaton]
name = "AgentSession"
states = ["Idle", "Assigned", "Working", "Blocked", "Completed", "Failed"]
initial = "Idle"

# --- State Variables ---

[[state]]
name = "work_item_id"
type = "string"
initial = ""

[[state]]
name = "pipeline_id"
type = "string"
initial = ""

[[state]]
name = "task_description"
type = "string"
initial = ""

[[state]]
name = "result_summary"
type = "string"
initial = ""

[[state]]
name = "block_reason"
type = "string"
initial = ""

# --- Actions: Session Lifecycle ---

[[action]]
name = "Assign"
kind = "input"
from = ["Idle"]
to = "Assigned"
params = ["work_item_id", "pipeline_id", "task_description"]
hint = "Assign a work item to this agent session."

[[action]]
name = "Start"
kind = "input"
from = ["Assigned"]
to = "Working"
hint = "Agent begins actively working on the assigned task."

[[action]]
name = "Block"
kind = "input"
from = ["Working"]
to = "Blocked"
params = ["reason"]
hint = "Agent is blocked and cannot continue. Records the blocking reason."

[[action]]
name = "Unblock"
kind = "input"
from = ["Blocked"]
to = "Working"
hint = "Blocking issue resolved, agent resumes work."

[[action]]
name = "Complete"
kind = "input"
from = ["Working"]
to = "Completed"
params = ["result_summary"]
hint = "Agent finished the task successfully with a result summary."

[[action]]
name = "Fail"
kind = "input"
from = ["Working", "Blocked"]
to = "Failed"
params = ["reason"]
hint = "Agent failed to complete the task. Can fail from Working or Blocked."

[[action]]
name = "Reset"
kind = "input"
from = ["Completed", "Failed"]
to = "Idle"
hint = "Reset the session for reuse. Clears all state variables."

# --- Safety Invariants ---

[[invariant]]
name = "AssignedRequiresWorkItem"
when = ["Assigned", "Working", "Blocked", "Completed", "Failed"]
assert = "work_item_id != ''"
