# WorkItem Entity — I/O Automaton Specification
#
# Represents a discrete unit of work within a pipeline.
# Tracks the full lifecycle from creation through claiming,
# execution, review, and completion. Spawned by Pipeline
# via the AddWorkItem action.

[automaton]
name = "WorkItem"
states = ["Open", "Claimed", "InProgress", "Review", "Done", "Cancelled"]
initial = "Open"

# --- State Variables ---

[[state]]
name = "agent_session_id"
type = "string"
initial = ""

[[state]]
name = "pipeline_id"
type = "string"
initial = ""

[[state]]
name = "title"
type = "string"
initial = ""

[[state]]
name = "description"
type = "string"
initial = ""

[[state]]
name = "deliverable"
type = "string"
initial = ""

[[state]]
name = "feedback"
type = "string"
initial = ""

# --- Actions: WorkItem Lifecycle ---

[[action]]
name = "Claim"
kind = "input"
from = ["Open"]
to = "Claimed"
params = ["agent_session_id"]
hint = "An agent claims this work item for execution."

[[action]]
name = "StartWork"
kind = "input"
from = ["Claimed"]
to = "InProgress"
hint = "Agent begins active work on the claimed item."

[[action]]
name = "SubmitForReview"
kind = "input"
from = ["InProgress"]
to = "Review"
params = ["deliverable"]
hint = "Agent submits completed work for review."

[[action]]
name = "Approve"
kind = "input"
from = ["Review"]
to = "Done"
hint = "Reviewer approves the submitted deliverable."
effect = [{ type = "emit_event", event = "WorkItemApproved" }]

[[action]]
name = "RequestChanges"
kind = "input"
from = ["Review"]
to = "InProgress"
params = ["feedback"]
hint = "Reviewer requests changes, sending item back to in-progress with feedback."

[[action]]
name = "Unclaim"
kind = "input"
from = ["Claimed"]
to = "Open"
hint = "Release the claim, making the work item available again. Clears agent_session_id."

[[action]]
name = "Cancel"
kind = "input"
from = ["Open", "Claimed", "InProgress"]
to = "Cancelled"
params = ["reason"]
hint = "Cancel the work item. Can be cancelled from Open, Claimed, or InProgress."

# --- Safety Invariants ---

[[invariant]]
name = "DoneIsFinal"
when = ["Done"]
assert = "no_further_transitions"

[[invariant]]
name = "CancelledIsFinal"
when = ["Cancelled"]
assert = "no_further_transitions"
