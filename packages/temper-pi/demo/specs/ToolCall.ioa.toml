# ToolCall Entity — I/O Automaton Specification
#
# Represents a single tool invocation by an agent. Each tool call is a
# durable entity with its own lifecycle. Cedar authorization is checked
# before execution. Denied calls create PendingDecisions for human review.
# On approval, the ToolCall can be retried.

[automaton]
name = "ToolCall"
states = ["Pending", "Authorized", "Denied", "Executing", "Completed", "Failed"]
initial = "Pending"

# --- State Variables ---

[[state]]
name = "agent_id"
type = "string"
initial = ""

[[state]]
name = "tool_name"
type = "string"
initial = ""

[[state]]
name = "tool_input"
type = "string"
initial = ""

[[state]]
name = "resource_type"
type = "string"
initial = ""

[[state]]
name = "resource_id"
type = "string"
initial = ""

[[state]]
name = "result"
type = "string"
initial = ""

[[state]]
name = "error"
type = "string"
initial = ""

[[state]]
name = "decision_id"
type = "string"
initial = ""

[[state]]
name = "duration_ms"
type = "string"
initial = "0"

# --- Actions: ToolCall Lifecycle ---

[[action]]
name = "Authorize"
kind = "input"
from = ["Pending"]
to = "Authorized"
hint = "Cedar policy allowed this tool call."

[[action]]
name = "Deny"
kind = "input"
from = ["Pending"]
to = "Denied"
params = ["decision_id"]
hint = "Cedar policy denied this tool call. PendingDecision created for human review."

[[action]]
name = "Execute"
kind = "input"
from = ["Authorized"]
to = "Executing"
hint = "Tool execution started on the client."

[[action]]
name = "Complete"
kind = "input"
from = ["Executing"]
to = "Completed"
params = ["result", "duration_ms"]
hint = "Tool execution finished successfully."

[[action]]
name = "Fail"
kind = "input"
from = ["Executing"]
to = "Failed"
params = ["error"]
hint = "Tool execution failed with an error."

[[action]]
name = "Retry"
kind = "input"
from = ["Denied"]
to = "Pending"
hint = "Human approved the denied decision. ToolCall returns to Pending for re-authorization."

# --- Safety Invariants ---

[[invariant]]
name = "RequiresAgentId"
when = ["Pending", "Authorized", "Denied", "Executing", "Completed", "Failed"]
assert = "agent_id != ''"

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"
