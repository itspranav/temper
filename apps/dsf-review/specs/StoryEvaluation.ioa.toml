[automaton]
name = "StoryEvaluation"
states = ["Fetched", "Tier1", "Tier2", "Tier3", "Archived"]
initial = "Fetched"

[[property]]
name = "StoryId"
type = "string"

[[property]]
name = "Title"
type = "string"

[[property]]
name = "Author"
type = "string"

[[property]]
name = "World"
type = "string"

[[property]]
name = "WorldYear"
type = "int"

[[property]]
name = "StoryURL"
type = "string"

[[property]]
name = "FScore"
type = "int"
initial = "0"

[[property]]
name = "CScore"
type = "int"
initial = "0"

[[property]]
name = "WScore"
type = "int"
initial = "0"

[[property]]
name = "OScore"
type = "int"
initial = "0"

[[property]]
name = "XScore"
type = "int"
initial = "0"

[[property]]
name = "PullQuote"
type = "string"

[[property]]
name = "Notes"
type = "string"

[[action]]
name = "Score"
kind = "input"
from = ["Fetched"]
to = "Fetched"
params = ["FScore", "CScore", "WScore", "OScore", "XScore"]

[[action]]
name = "PromoteToTier1"
kind = "input"
from = ["Fetched", "Tier2", "Tier3"]
to = "Tier1"

[[action]]
name = "PromoteToTier2"
kind = "input"
from = ["Fetched", "Tier3"]
to = "Tier2"

[[action]]
name = "DemoteToTier2"
kind = "input"
from = ["Tier1"]
to = "Tier2"

[[action]]
name = "DemoteToTier3"
kind = "input"
from = ["Tier1", "Tier2"]
to = "Tier3"

[[action]]
name = "Archive"
kind = "input"
from = ["Fetched", "Tier1", "Tier2", "Tier3"]
to = "Archived"

[[action]]
name = "SetPullQuote"
kind = "input"
from = ["Fetched", "Tier1", "Tier2", "Tier3"]
to = "Fetched"
params = ["PullQuote"]

[[action]]
name = "UpdateNotes"
kind = "input"
from = ["Fetched", "Tier1", "Tier2", "Tier3", "Archived"]
to = "Fetched"
params = ["Notes"]
