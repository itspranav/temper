<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Loop — Temper Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script>
tailwindcss.config = {
  theme: {
    extend: {
      fontFamily: { grotesk: ['Space Grotesk'], mono: ['Space Mono'] },
      colors: {
        s1: '#08080c', s2: '#101016', s3: '#18181f', s4: '#222230',
        t1: '#eeeef2', t2: '#8888a0', t3: '#555568',
        violet: '#8b5cf6', lime: '#84cc16', rose: '#f43f5e', sky: '#38bdf8', amber: '#f59e0b',
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Space Grotesk', sans-serif; background: #08080c; color: #eeeef2; margin: 0; min-height: 100vh; overflow-x: hidden; }
  .glass { background: rgba(16,16,24,0.30); backdrop-filter: blur(48px) saturate(2.0); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb-violet { width: 500px; height: 500px; background: rgba(139,92,246,0.12); top: -100px; left: -100px; }
  .orb-lime { width: 400px; height: 400px; background: rgba(132,204,22,0.08); bottom: -80px; right: -80px; }
  .status-badge { font-family: 'Space Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 8px; display: inline-block; }
  .actor-human { color: #38bdf8; }
  .actor-agent { color: #84cc16; }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .btn { font-family: 'Space Mono', monospace; font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #eeeef2; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
  .btn-primary { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); }
  .btn-primary:hover { background: rgba(139,92,246,0.35); }
  .btn-agent { background: rgba(132,204,22,0.15); border-color: rgba(132,204,22,0.3); color: #84cc16; }
  .input { font-family: 'Space Mono', monospace; font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); color: #eeeef2; width: 100%; }
  .input:focus { outline: none; border-color: rgba(139,92,246,0.5); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #84cc16; display: inline-block; }
</style>
</head>
<body>
<div class="orb orb-violet"></div>
<div class="orb orb-lime"></div>

<div style="position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 32px 20px;">

  <!-- Header -->
  <div style="margin-bottom: 32px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
      <h1 style="font-size: 28px; font-weight: 700; margin: 0;">Agent Loop</h1>
      <span class="live-dot pulse" title="SSE connected"></span>
      <span id="sse-status" style="font-family: 'Space Mono'; font-size: 11px; color: #555568;">connecting...</span>
    </div>
    <p style="color: #8888a0; font-size: 14px; margin: 0;">Human and agent — same surface, same state machine, real-time.</p>
    <div style="margin-top: 12px; display: flex; gap: 8px; font-family: 'Space Mono'; font-size: 11px;">
      <span class="actor-human">● Human actions</span>
      <span style="color: #555568;">|</span>
      <span class="actor-agent">● Agent actions</span>
    </div>
  </div>

  <!-- Create Task -->
  <div class="glass" style="padding: 16px; margin-bottom: 24px;">
    <div style="display: flex; gap: 8px; align-items: center;">
      <input id="new-task" class="input" placeholder="New task..." style="flex: 1;" onkeydown="if(event.key==='Enter')createTask()">
      <button class="btn btn-primary" onclick="createTask()">Create</button>
    </div>
  </div>

  <!-- Task List -->
  <div id="tasks" style="display: flex; flex-direction: column; gap: 12px;"></div>

  <!-- Event Timeline -->
  <div style="margin-top: 40px;">
    <h2 style="font-family: 'Space Mono'; font-size: 14px; color: #8888a0; margin-bottom: 16px;">Live Timeline</h2>
    <div id="timeline" style="display: flex; flex-direction: column; gap: 0;"></div>
  </div>
</div>

<script>
const TENANT = 'agent-loop';
const API = '/tdata';

// State
let tasks = [];
let timeline = [];

// Status colors
const STATUS_COLORS = {
  'Open': '#8888a0',
  'Assigned': '#38bdf8',
  'Approved': '#8b5cf6',
  'InProgress': '#f59e0b',
  'Review': '#f43f5e',
  'Done': '#84cc16',
};

// Which actions are human vs agent
const AGENT_ACTIONS = new Set(['StartWork', 'SubmitForReview']);
const HUMAN_ACTIONS = new Set(['Assign', 'Approve', 'Reject', 'Accept', 'Reopen', 'Created']);

// Available actions per status
const ACTIONS = {
  'Open': [{ name: 'Assign', label: 'Assign', actor: 'human' }],
  'Assigned': [
    { name: 'Approve', label: 'Approve', actor: 'human' },
    { name: 'Reject', label: 'Reject', actor: 'human' },
  ],
  'Approved': [
    { name: 'StartWork', label: '🤖 Start Work', actor: 'agent' },
  ],
  'InProgress': [
    { name: 'SubmitForReview', label: '🤖 Submit for Review', actor: 'agent' },
  ],
  'Review': [
    { name: 'Accept', label: 'Accept', actor: 'human' },
    { name: 'Reject', label: 'Reject', actor: 'human' },
  ],
  'Done': [
    { name: 'Reopen', label: 'Reopen', actor: 'human' },
  ],
};

async function fetchTasks() {
  const resp = await fetch(`${API}/Tasks`, { headers: { 'X-Tenant-Id': TENANT } });
  const data = await resp.json();
  tasks = data.value || [];
  render();
}

async function createTask() {
  const input = document.getElementById('new-task');
  const title = input.value.trim();
  if (!title) return;
  input.value = '';
  await fetch(`${API}/Tasks`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Tenant-Id': TENANT },
    body: JSON.stringify({ Title: title })
  });
  fetchTasks();
}

async function fireAction(entityId, action) {
  await fetch(`${API}/Tasks('${entityId}')/Temper.${action}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Tenant-Id': TENANT },
    body: '{}'
  });
  fetchTasks();
}

function render() {
  const container = document.getElementById('tasks');
  if (tasks.length === 0) {
    container.innerHTML = '<div class="glass" style="padding: 32px; text-align: center; color: #555568; font-family: Space Mono; font-size: 13px;">No tasks yet. Create one above.</div>';
    return;
  }

  container.innerHTML = tasks.map(t => {
    const status = t.status;
    const color = STATUS_COLORS[status] || '#8888a0';
    const title = t.fields?.Title || t.entity_id.slice(0, 8);
    const actions = ACTIONS[status] || [];
    const isAgentWorking = t.booleans?.agent_working;

    return `
      <div class="glass" style="padding: 16px; border-left: 3px solid ${color};">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
          <div style="flex: 1; min-width: 0;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
              <span style="font-size: 16px; font-weight: 600;">${title}</span>
              ${isAgentWorking ? '<span class="pulse" style="font-size: 11px; color: #84cc16; font-family: Space Mono;">🤖 working...</span>' : ''}
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span class="status-badge" style="background: ${color}22; color: ${color};">${status}</span>
              <span style="font-family: Space Mono; font-size: 10px; color: #555568;">${t.entity_id.slice(0, 8)}</span>
            </div>
          </div>
          <div style="display: flex; gap: 6px; flex-shrink: 0;">
            ${actions.map(a => `
              <button class="btn ${a.actor === 'agent' ? 'btn-agent' : ''}"
                      onclick="fireAction('${t.entity_id}', '${a.name}')">
                ${a.label}
              </button>
            `).join('')}
          </div>
        </div>

        <!-- Mini event timeline -->
        <div style="margin-top: 12px; display: flex; gap: 4px; flex-wrap: wrap;">
          ${(t.events || []).map(e => {
            const isAgent = AGENT_ACTIONS.has(e.action);
            const c = isAgent ? '#84cc16' : '#38bdf8';
            const time = new Date(e.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            return `<span style="font-family: Space Mono; font-size: 10px; color: ${c}; background: ${c}11; padding: 1px 6px; border-radius: 4px;" title="${time}">${e.action}</span>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function addToTimeline(action, entityId, fromStatus, toStatus) {
  const isAgent = AGENT_ACTIONS.has(action);
  const entry = { action, entityId, fromStatus, toStatus, isAgent, time: new Date() };
  timeline.unshift(entry);
  if (timeline.length > 20) timeline.pop();
  renderTimeline();
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  if (timeline.length === 0) {
    container.innerHTML = '<div style="font-family: Space Mono; font-size: 11px; color: #555568;">Waiting for events...</div>';
    return;
  }
  container.innerHTML = timeline.map(e => {
    const c = e.isAgent ? '#84cc16' : '#38bdf8';
    const actor = e.isAgent ? 'Agent' : 'Human';
    const time = e.time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    return `
      <div style="display: flex; gap: 12px; padding: 6px 0;">
        <div style="display: flex; flex-direction: column; align-items: center; width: 8px;">
          <div class="timeline-dot" style="background: ${c};"></div>
          <div style="width: 1px; flex: 1; background: rgba(255,255,255,0.06);"></div>
        </div>
        <div style="flex: 1;">
          <span style="font-family: Space Mono; font-size: 11px; color: ${c};">${actor}</span>
          <span style="font-family: Space Mono; font-size: 11px; color: #8888a0;"> ${e.action} </span>
          <span style="font-family: Space Mono; font-size: 11px; color: #555568;">${e.fromStatus} → ${e.toStatus}</span>
          <span style="font-family: Space Mono; font-size: 10px; color: #555568; margin-left: 8px;">${time}</span>
        </div>
      </div>
    `;
  }).join('');
}

// SSE — real-time updates
function connectSSE() {
  const status = document.getElementById('sse-status');
  const events = new EventSource(`${API}/$events`);

  events.onopen = () => {
    status.textContent = 'live';
    status.style.color = '#84cc16';
  };

  events.onmessage = (e) => {
    try {
      const change = JSON.parse(e.data);
      if (change.tenant === TENANT && change.entity_type === 'Task') {
        addToTimeline(change.action, change.entity_id, '', change.status);
        fetchTasks(); // re-fetch to get full state
      }
    } catch {}
  };

  events.onerror = () => {
    status.textContent = 'reconnecting...';
    status.style.color = '#f59e0b';
    events.close();
    setTimeout(connectSSE, 3000);
  };
}

// Init
fetchTasks();
connectSSE();
renderTimeline();
</script>
</body>
</html>
