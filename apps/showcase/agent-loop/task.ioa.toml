# Task entity — demonstrates human + agent as co-actors.
# Human creates, assigns, approves. Agent starts work, completes, reports.

[entity]
name = "Task"
initial_status = "Open"

[vars]
is_assigned = { type = "bool", init = false }
agent_working = { type = "bool", init = false }

# Human actions
[[actions]]
name = "Assign"
from = ["Open"]
to = "Assigned"
effects = [{ set = { var = "is_assigned", value = true } }]

[[actions]]
name = "Approve"
from = ["Assigned"]
to = "Approved"
guards = [{ is_true = "is_assigned" }]

[[actions]]
name = "Reject"
from = ["Assigned", "Review"]
to = "Open"
effects = [{ set = { var = "is_assigned", value = false } }, { set = { var = "agent_working", value = false } }]

# Agent actions
[[actions]]
name = "StartWork"
from = ["Approved"]
to = "InProgress"
effects = [{ set = { var = "agent_working", value = true } }]

[[actions]]
name = "SubmitForReview"
from = ["InProgress"]
to = "Review"
effects = [{ set = { var = "agent_working", value = false } }]

# Human reviews
[[actions]]
name = "Accept"
from = ["Review"]
to = "Done"

# Reopen from done
[[actions]]
name = "Reopen"
from = ["Done"]
to = "Open"
effects = [{ set = { var = "is_assigned", value = false } }]
