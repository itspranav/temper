<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Pipeline</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config={theme:{extend:{colors:{base:{DEFAULT:'#0a0a0c',50:'#12121a',100:'#1a1a24',200:'#242430'},pri:{DEFAULT:'#7c6cff',dim:'rgba(124,108,255,0.12)',light:'#9d8fff'},ok:{DEFAULT:'#34d399',dim:'rgba(52,211,153,0.12)'},warn:{DEFAULT:'#fbbf24',dim:'rgba(251,191,36,0.12)'},err:{DEFAULT:'#f87171',dim:'rgba(248,113,113,0.12)'},info:{DEFAULT:'#38bdf8',dim:'rgba(56,189,248,0.12)'},txt:{DEFAULT:'#eeeef2',2:'#9898a8',3:'#5c5c6e'},glass:{DEFAULT:'rgba(255,255,255,0.06)',2:'rgba(255,255,255,0.1)'}},fontFamily:{sans:['Inter','system-ui','sans-serif'],mono:['"JetBrains Mono"','"SF Mono"','monospace']}}}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { background: #0a0a0c; color: #eeeef2; -webkit-font-smoothing: antialiased; }
  .glass { background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
  .glow-top { background-image: radial-gradient(ellipse at 50% -20%, rgba(124,108,255,0.08) 0%, transparent 60%); }
  .glass-static { background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.06); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
</style>
</head>
<body class="font-sans text-txt min-h-screen glow-top">
<div class="mx-auto w-full max-w-6xl px-4 sm:px-6 lg:px-8 py-6 sm:py-8">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold tracking-tight">🔥 Content Pipeline</h1>
      <p class="text-xs font-mono text-txt-3 mt-1">calcifer · february 2026</p>
    </div>
    <div class="glass rounded-lg flex overflow-hidden">
      <button onclick="setView('calendar')" class="view-btn px-3 py-1.5 text-xs font-mono font-medium transition-all bg-pri-dim text-pri" data-view="calendar">Calendar</button>
      <button onclick="setView('list')" class="view-btn px-3 py-1.5 text-xs font-mono font-medium transition-all text-txt-3 hover:text-txt-2" data-view="list">List</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
    <div class="glass rounded-lg p-3 sm:p-4">
      <div class="text-xl sm:text-2xl font-semibold font-mono text-txt-3">3</div>
      <div class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mt-1">Drafts</div>
    </div>
    <div class="glass rounded-lg p-3 sm:p-4">
      <div class="text-xl sm:text-2xl font-semibold font-mono text-warn">2</div>
      <div class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mt-1">In Review</div>
    </div>
    <div class="glass rounded-lg p-3 sm:p-4">
      <div class="text-xl sm:text-2xl font-semibold font-mono text-pri">4</div>
      <div class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mt-1">Scheduled</div>
    </div>
    <div class="glass rounded-lg p-3 sm:p-4">
      <div class="text-xl sm:text-2xl font-semibold font-mono text-ok">12</div>
      <div class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mt-1">Published</div>
    </div>
  </div>

  <!-- Calendar View -->
  <div id="calendar-view" class="mb-6">
    <div class="glass rounded-xl overflow-hidden">
      <!-- Day headers -->
      <div class="grid grid-cols-7 border-b border-glass">
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block" id="day-Mon">Mon</div>
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block">Tue</div>
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block">Wed</div>
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block">Thu</div>
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block">Fri</div>
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block">Sat</div>
        <div class="p-2 sm:p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 hidden sm:block">Sun</div>
      </div>
      <div class="grid grid-cols-7" id="cal-grid"></div>
    </div>
  </div>

  <!-- List View -->
  <div id="list-view" class="hidden mb-10"></div>

  <!-- Temper Integration -->
  <div id="temper-section"></div>
</div>
<script src="temper-sections.js"></script>

<script>
const POSTS = [
  { title:'When Your AI Builds Its Own Guardrails', platform:'Blog + X', status:'review', author:'🐱 Jiji', date:20 },
  { title:'Temper: Shared Backend for AI Agents', platform:'X Thread', status:'review', author:'🔥 Calcifer', date:20 },
  { title:'Feed Rewrite: 1925→108 Lines', platform:'X Post', status:'scheduled', author:'🔥 Calcifer', date:21 },
  { title:'Deep Sci-Fi Feb Update', platform:'Blog', status:'draft', author:'🐱 Jiji', date:22 },
  { title:'Story Arc Detection is Live', platform:'X Post', status:'scheduled', author:'🔥 Calcifer', date:22 },
  { title:'Relationship Graphs: The Jitter Fix', platform:'X Post', status:'scheduled', author:'🔥 Calcifer', date:23 },
  { title:'Video Regen Pipeline', platform:'X Thread', status:'draft', author:'🔥 Calcifer', date:24 },
  { title:'Verification Cascade Deep Dive', platform:'Blog', status:'draft', author:'🐱 Jiji', date:25 },
  { title:'World Map Clusters Fix', platform:'X Post', status:'scheduled', author:'🔥 Calcifer', date:25 },
  { title:'SSE Migration Complete', platform:'X Post', status:'published', author:'🔥 Calcifer', date:18, engagement:'2.4k' },
  { title:'Building in Public with AI Agents', platform:'X Thread', status:'published', author:'🔥 Calcifer', date:15, engagement:'5.1k' },
  { title:'Deep Sci-Fi Launch Week', platform:'X Thread', status:'published', author:'🔥 Calcifer', date:13, engagement:'8.3k' },
];

const STATUS_STYLES = {
  draft: { bg:'bg-white/[0.04]', text:'text-txt-3', badge:'bg-base-200 text-txt-3' },
  review: { bg:'bg-warn/[0.06]', text:'text-warn', badge:'bg-warn-dim text-warn' },
  scheduled: { bg:'bg-pri/[0.06]', text:'text-pri', badge:'bg-pri-dim text-pri' },
  published: { bg:'bg-ok/[0.06]', text:'text-ok', badge:'bg-ok-dim text-ok' },
};

function renderCalendar() {
  const firstDay = 6; // Feb 2026 starts on Sunday (index 6 in Mon-first)
  const days = 28;
  let html = '';
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="border-r border-b border-glass p-1.5 sm:p-2 min-h-[4rem] sm:min-h-[6rem] opacity-30">
      <span class="text-[11px] font-mono text-txt-3">${26+i}</span>
    </div>`;
  }
  for (let d = 1; d <= days; d++) {
    const isToday = d === 20;
    const items = POSTS.filter(p => p.date === d);
    html += `<div class="border-r border-b border-glass p-1.5 sm:p-2 min-h-[4rem] sm:min-h-[6rem] transition-all hover:bg-white/[0.01] ${isToday ? 'bg-pri/[0.03]' : ''}">
      <span class="text-[11px] font-mono ${isToday ? 'text-pri font-medium' : 'text-txt-3'}">${d}</span>
      <div class="mt-1 flex flex-col gap-0.5">
        ${items.map(p => {
          const s = STATUS_STYLES[p.status];
          return `<div class="px-1.5 py-0.5 rounded text-[10px] sm:text-[11px] truncate cursor-pointer transition-all hover:brightness-125 ${s.bg} ${s.text}" title="${p.title}">${p.title}</div>`;
        }).join('')}
      </div>
    </div>`;
  }
  const total = firstDay + days;
  const rem = (7 - total % 7) % 7;
  for (let i = 1; i <= rem; i++) {
    html += `<div class="border-r border-b border-glass p-1.5 sm:p-2 min-h-[4rem] sm:min-h-[6rem] opacity-30">
      <span class="text-[11px] font-mono text-txt-3">${i}</span>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderList() {
  const groups = { draft:[], review:[], scheduled:[], published:[] };
  POSTS.forEach(p => groups[p.status].push(p));
  const labels = { draft:'Drafts', review:'In Review', scheduled:'Scheduled', published:'Published' };
  
  document.getElementById('list-view').innerHTML = Object.entries(groups).filter(([_,p]) => p.length).map(([status, posts]) => `
    <div class="mb-6">
      <h3 class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mb-3 pb-2 border-b border-glass">${labels[status]} (${posts.length})</h3>
      <div class="flex flex-col gap-1">
        ${posts.map(p => {
          const s = STATUS_STYLES[status];
          return `<div class="flex items-center gap-3 px-3 sm:px-4 py-2.5 sm:py-3 rounded-lg hover:bg-white/[0.02] transition-all cursor-pointer">
            <div class="flex-1 min-w-0">
              <div class="text-sm truncate">${p.title}</div>
              <div class="text-[11px] font-mono text-txt-3 mt-0.5">${p.platform}</div>
            </div>
            <span class="hidden sm:block text-sm text-txt-2">${p.author}</span>
            <span class="inline-flex px-2 py-0.5 rounded text-[10px] font-mono font-medium uppercase tracking-wider ${s.badge} shrink-0">${status}</span>
            <span class="hidden sm:block text-xs font-mono text-txt-3 w-12 text-right">Feb ${p.date}</span>
            ${p.engagement ? `<span class="hidden sm:block text-xs font-mono text-txt-3 w-10 text-right">${p.engagement}</span>` : `<span class="hidden sm:block w-10"></span>`}
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function setView(v) {
  document.getElementById('calendar-view').classList.toggle('hidden', v !== 'calendar');
  document.getElementById('list-view').classList.toggle('hidden', v !== 'list');
  document.querySelectorAll('.view-btn').forEach(b => {
    const isActive = b.dataset.view === v;
    b.classList.toggle('bg-pri-dim', isActive);
    b.classList.toggle('text-pri', isActive);
    b.classList.toggle('text-txt-3', !isActive);
  });
}

renderCalendar();
renderList();
renderTemperSection('temper-section', 'content-pipeline');
</script>
</body>
</html>
