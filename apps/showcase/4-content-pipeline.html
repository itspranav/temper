<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Pipeline</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwindcss.config={theme:{extend:{colors:{s1:'#0c0c10',s2:'#14141a',s3:'#1c1c24',s4:'#24242e',t1:'#ededf0',t2:'#8b8b9e',t3:'#55556a',a1:'#8b5cf6',a2:'#a78bfa',a3:'rgba(139,92,246,0.12)',b1:'rgba(255,255,255,0.06)',b2:'rgba(255,255,255,0.10)',green:{DEFAULT:'#3dd68c',dim:'rgba(61,214,140,0.10)'},amber:{DEFAULT:'#e5a63e',dim:'rgba(229,166,62,0.10)'},red:{DEFAULT:'#e5534b',dim:'rgba(229,83,75,0.10)'}},fontFamily:{sans:['Geist','system-ui','sans-serif'],mono:['Geist Mono','monospace']}}}}</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Geist',system-ui,sans-serif;background:#0c0c10;color:#ededf0;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;top:-30%;left:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(139,92,246,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(61,214,140,0.04) 0%,transparent 70%);pointer-events:none;z-index:0}
  body>*{position:relative;z-index:1}
  .glass{background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.02) 100%);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:99px}
  ::selection{background:rgba(139,92,246,0.3)}
</style>
</head>
<body>
<div class="mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-6 sm:py-10">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <div><h1 class="text-xl sm:text-2xl font-semibold tracking-tight">🔥 Content Pipeline</h1><p class="text-sm text-t2 mt-1">Calcifer · February 2026</p></div>
    <div class="glass rounded-xl flex overflow-hidden">
      <button onclick="setV('cal')" class="vb px-3 py-1.5 text-xs font-mono font-medium transition-all bg-a3 text-a2" data-v="cal">Calendar</button>
      <button onclick="setV('list')" class="vb px-3 py-1.5 text-xs font-mono font-medium transition-all text-t3 hover:text-t2" data-v="list">List</button>
    </div>
  </div>
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
    <div class="glass rounded-xl p-3 sm:p-4"><div class="text-xl font-semibold font-mono text-t3">3</div><div class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mt-1">Drafts</div></div>
    <div class="glass rounded-xl p-3 sm:p-4"><div class="text-xl font-semibold font-mono text-amber">2</div><div class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mt-1">In Review</div></div>
    <div class="glass rounded-xl p-3 sm:p-4"><div class="text-xl font-semibold font-mono text-a1">4</div><div class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mt-1">Scheduled</div></div>
    <div class="glass rounded-xl p-3 sm:p-4"><div class="text-xl font-semibold font-mono text-green">12</div><div class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mt-1">Published</div></div>
  </div>
  <div id="calv" class="glass rounded-2xl overflow-hidden mb-6">
    <div class="grid grid-cols-7 border-b border-b1 hidden sm:grid"><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Mon</div><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Tue</div><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Wed</div><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Thu</div><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Fri</div><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Sat</div><div class="p-3 text-center text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3">Sun</div></div>
    <div class="grid grid-cols-7" id="cg"></div>
  </div>
  <div id="listv" class="hidden mb-6"></div>
  <div id="temper-section"></div>
</div>
<script src="temper-sections.js"></script>
<script>
const P=[
  {t:'When Your AI Builds Its Own Guardrails',p:'Blog+X',s:'review',a:'🐱',d:20},
  {t:'Temper: Shared Backend for AI Agents',p:'X Thread',s:'review',a:'🔥',d:20},
  {t:'Feed Rewrite: 1925→108 Lines',p:'X Post',s:'scheduled',a:'🔥',d:21},
  {t:'Deep Sci-Fi Feb Update',p:'Blog',s:'draft',a:'🐱',d:22},
  {t:'Story Arc Detection is Live',p:'X Post',s:'scheduled',a:'🔥',d:22},
  {t:'Relationship Graphs: Jitter Fix',p:'X Post',s:'scheduled',a:'🔥',d:23},
  {t:'Video Regen Pipeline',p:'X Thread',s:'draft',a:'🔥',d:24},
  {t:'Verification Cascade Deep Dive',p:'Blog',s:'draft',a:'🐱',d:25},
  {t:'World Map Clusters Fix',p:'X Post',s:'scheduled',a:'🔥',d:25},
  {t:'SSE Migration Complete',p:'X Post',s:'published',a:'🔥',d:18,e:'2.4k'},
  {t:'Building in Public with AI Agents',p:'X Thread',s:'published',a:'🔥',d:15,e:'5.1k'},
  {t:'Deep Sci-Fi Launch Week',p:'X Thread',s:'published',a:'🔥',d:13,e:'8.3k'},
];
const SC={draft:{bg:'bg-white/[0.03]',t:'text-t3',b:'bg-s4 text-t3'},review:{bg:'bg-amber/[0.05]',t:'text-amber',b:'bg-amber-dim text-amber'},scheduled:{bg:'bg-a1/[0.05]',t:'text-a2',b:'bg-a3 text-a2'},published:{bg:'bg-green/[0.05]',t:'text-green',b:'bg-green-dim text-green'}};

function renderCal(){
  const fd=6;let h='';
  for(let i=0;i<fd;i++)h+=`<div class="border-r border-b border-b1 p-1.5 sm:p-2 min-h-[4rem] sm:min-h-[6rem] opacity-25"><span class="text-[11px] font-mono text-t3">${26+i}</span></div>`;
  for(let d=1;d<=28;d++){const today=d===20,items=P.filter(p=>p.d===d);h+=`<div class="border-r border-b border-b1 p-1.5 sm:p-2 min-h-[4rem] sm:min-h-[6rem] transition-all hover:bg-white/[0.01] ${today?'bg-a1/[0.03]':''}"><span class="text-[11px] font-mono ${today?'text-a2 font-medium':'text-t3'}">${d}</span><div class="mt-1 flex flex-col gap-0.5">${items.map(p=>{const s=SC[p.s];return`<div class="px-1.5 py-0.5 rounded-md text-[10px] sm:text-[11px] truncate cursor-pointer transition-all hover:brightness-125 ${s.bg} ${s.t}" title="${p.t}">${p.t}</div>`;}).join('')}</div></div>`;}
  const tot=fd+28,rem=(7-tot%7)%7;for(let i=1;i<=rem;i++)h+=`<div class="border-r border-b border-b1 p-1.5 sm:p-2 min-h-[4rem] sm:min-h-[6rem] opacity-25"><span class="text-[11px] font-mono text-t3">${i}</span></div>`;
  document.getElementById('cg').innerHTML=h;
}
function renderList(){
  const g={draft:[],review:[],scheduled:[],published:[]};P.forEach(p=>g[p.s].push(p));
  const lb={draft:'Drafts',review:'In Review',scheduled:'Scheduled',published:'Published'};
  document.getElementById('listv').innerHTML=Object.entries(g).filter(([_,p])=>p.length).map(([s,ps])=>`<div class="mb-6"><h3 class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mb-3 pb-2 border-b border-b1">${lb[s]} (${ps.length})</h3>${ps.map(p=>{const c=SC[s];return`<div class="flex items-center gap-3 px-4 py-3 -mx-4 rounded-xl hover:bg-white/[0.02] transition-all cursor-pointer"><div class="flex-1 min-w-0"><div class="text-sm truncate">${p.t}</div><div class="text-[11px] font-mono text-t3 mt-0.5">${p.p}</div></div><span class="hidden sm:block text-sm text-t2">${p.a}</span><span class="h-5 px-2 rounded-full text-[10px] font-mono font-medium tracking-wide ${c.b} inline-flex items-center shrink-0">${s}</span><span class="hidden sm:block text-xs font-mono text-t3 w-12 text-right">Feb ${p.d}</span>${p.e?`<span class="hidden sm:block text-xs font-mono text-t3 w-10 text-right">${p.e}</span>`:''}</div>`}).join('')}</div>`).join('');
}
function setV(v){document.getElementById('calv').classList.toggle('hidden',v!=='cal');document.getElementById('listv').classList.toggle('hidden',v!=='list');document.querySelectorAll('.vb').forEach(b=>{const on=b.dataset.v===v;b.classList.toggle('bg-a3',on);b.classList.toggle('text-a2',on);b.classList.toggle('text-t3',!on);});}
renderCal();renderList();
renderTemperSection('temper-section','content-pipeline');
</script>
</body>
</html>
