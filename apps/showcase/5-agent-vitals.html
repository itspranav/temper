<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Vitals</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config={theme:{extend:{colors:{s1:'#0c0c10',s2:'#14141a',s3:'#1c1c24',s4:'#24242e',t1:'#ededf0',t2:'#8b8b9e',t3:'#55556a',a1:'#8b5cf6',a2:'#a78bfa',a3:'rgba(139,92,246,0.12)',b1:'rgba(255,255,255,0.06)',b2:'rgba(255,255,255,0.10)',green:{DEFAULT:'#3dd68c',dim:'rgba(61,214,140,0.10)'},amber:{DEFAULT:'#e5a63e',dim:'rgba(229,166,62,0.10)'},red:{DEFAULT:'#e5534b',dim:'rgba(229,83,75,0.10)'},blue:{DEFAULT:'#38bdf8',dim:'rgba(56,189,248,0.10)'},purple:{DEFAULT:'#c084fc',dim:'rgba(192,132,252,0.10)'}},fontFamily:{sans:['Geist','system-ui','sans-serif'],mono:['Geist Mono','"JetBrains Mono"','monospace']}}}}
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Geist',system-ui,sans-serif;background:#0c0c10;color:#ededf0;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;top:-30%;left:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(139,92,246,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(61,214,140,0.04) 0%,transparent 70%);pointer-events:none;z-index:0}
  body>*{position:relative;z-index:1}
  .glass{background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.02) 100%);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:99px}
  ::selection{background:rgba(139,92,246,0.3)}
</style>
</head>
<body>
<div class="mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-6 sm:py-10">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
    <div><h1 class="text-xl sm:text-2xl font-semibold tracking-tight">Agent Vitals</h1><p class="text-sm text-t2 mt-1">Team health · real-time</p></div>
    <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full bg-green animate-pulse"></div><span class="text-xs font-mono text-t3" id="ts">—</span></div>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10" id="agents"></div>
  <h3 class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mb-3">Infrastructure</h3>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-12" id="sys"></div>
  <div id="temper-section"></div>
</div>
<script src="temper-sections.js"></script>
<script>
const A=[
  {n:'Haku',e:'🐉',r:'Engineering',st:'ok',c:'a1',m:{actions:47,proposals:10,uptime:'99.2%'},sp:[3,5,2,8,4,6,7,3,5,9,4,6,2,8,5,7,3,6,4,8,5,3,7,6],rc:[{t:'18:25',x:'Design system v3 committed'},{t:'17:49',x:'PROP-027 selected'},{t:'16:30',x:'Webhook dispatch started'}]},
  {n:'Calcifer',e:'🔥',r:'Content',st:'ok',c:'red',m:{posts:12,drafts:3,reach:'15.8k'},sp:[2,4,1,3,5,2,4,3,6,2,5,3,4,1,6,3,2,5,4,3,2,6,4,3],rc:[{t:'15:20',x:'X draft: shared backend'},{t:'14:00',x:'Blog voice pass'}]},
  {n:'Jiji',e:'🐱',r:'Writing',st:'warn',c:'purple',m:{articles:4,words:'12.4k',queue:2},sp:[1,2,0,3,1,2,0,4,2,1,3,0,2,1,3,2,0,1,4,2,1,0,3,1],rc:[{t:'14:00',x:'Blog needs more failure stories'}]},
  {n:'Chihiro',e:'🌸',r:'Admin',st:'ok',c:'blue',m:{tasks:8,resolved:23,pending:3},sp:[4,3,5,2,4,6,3,5,2,4,3,5,6,2,4,3,5,4,2,6,3,4,5,3],rc:[{t:'11:30',x:'Appointment → Thursday'}]},
  {n:'Koi',e:'🎏',r:'Architecture',st:'off',c:'green',m:{reviews:5,decisions:3,pending:1},sp:[0,1,0,2,0,1,0,0,2,0,1,0,0,1,0,2,0,0,1,0,0,2,0,1],rc:[{t:'10:00',x:'PROP-028 approved'}]},
  {n:'Ponyo',e:'🐟',r:'Monitoring',st:'ok',c:'amber',m:{checks:144,alerts:2,uptime:'100%'},sp:[6,6,6,6,6,6,6,6,6,6,6,5,6,6,6,6,6,6,6,6,6,6,6,6],rc:[{t:'18:00',x:'All nominal'},{t:'14:23',x:'⚠ SSE 502 → Haku'}]}
];
const CM={a1:{av:'bg-a3',bar:'bg-a1'},red:{av:'bg-red-dim',bar:'bg-red'},purple:{av:'bg-purple-dim',bar:'bg-purple'},blue:{av:'bg-blue-dim',bar:'bg-blue'},green:{av:'bg-green-dim',bar:'bg-green'},amber:{av:'bg-amber-dim',bar:'bg-amber'}};
const DOT={ok:'bg-green',warn:'bg-amber animate-pulse',err:'bg-red animate-pulse',off:'bg-s4'};
const SYS=[{i:'🌐',n:'Deep Sci-Fi',d:'api.deep-sci-fi.world',s:'ok'},{i:'⚙️',n:'Temper',d:'localhost:3001',s:'ok'},{i:'🚂',n:'Railway',d:'1GB instance',s:'warn'},{i:'📊',n:'Postgres',d:'schema e97cb81',s:'ok'}];

function render(){
  document.getElementById('agents').innerHTML=A.map(a=>{
    const c=CM[a.c],mx=Math.max(...a.sp);
    return`<div class="glass rounded-2xl p-5">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl ${c.av} flex items-center justify-center text-xl shrink-0">${a.e}</div>
        <div class="flex-1 min-w-0"><div class="font-medium">${a.n}</div><div class="text-[11px] font-mono text-t3">${a.r}</div></div>
        <div class="w-2 h-2 rounded-full ${DOT[a.st]} shrink-0"></div>
      </div>
      <div class="grid grid-cols-3 gap-2 mb-4">${Object.entries(a.m).map(([k,v])=>`<div class="text-center"><div class="text-base font-semibold font-mono">${v}</div><div class="text-[10px] font-mono font-medium uppercase tracking-[0.08em] text-t3 mt-0.5">${k}</div></div>`).join('')}</div>
      <div class="flex items-end gap-px h-8 mb-4">${a.sp.map(v=>`<div class="flex-1 rounded-t ${c.bar}" style="height:${Math.max(8,(v/mx)*100)}%;opacity:${0.2+(v/mx)*0.8}"></div>`).join('')}</div>
      <div class="text-[11px] font-mono font-medium uppercase tracking-[0.1em] text-t3 mb-2">Recent</div>
      ${a.rc.map(r=>`<div class="flex items-start gap-2 py-1"><span class="text-[11px] font-mono text-t3 shrink-0">${r.t}</span><span class="text-[13px] text-t2">${r.x}</span></div>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('sys').innerHTML=SYS.map(s=>`<div class="glass rounded-xl p-3.5 flex items-center gap-3"><span class="text-lg shrink-0">${s.i}</span><div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${s.n}</div><div class="text-[11px] font-mono text-t3 mt-0.5 truncate">${s.d}</div></div><span class="h-5 px-2 rounded-full text-[10px] font-mono font-medium tracking-wide inline-flex items-center shrink-0 ${s.s==='ok'?'bg-green-dim text-green':'bg-amber-dim text-amber'}">${s.s}</span></div>`).join('');
  document.getElementById('ts').textContent=new Date().toLocaleTimeString();
}
render();setInterval(render,30000);
renderTemperSection('temper-section','agent-vitals');
</script>
</body>
</html>
