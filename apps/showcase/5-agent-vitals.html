<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Vitals</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config={theme:{extend:{colors:{base:{DEFAULT:'#0a0a0c',50:'#12121a',100:'#1a1a24',200:'#242430'},pri:{DEFAULT:'#7c6cff',dim:'rgba(124,108,255,0.12)',light:'#9d8fff'},ok:{DEFAULT:'#34d399',dim:'rgba(52,211,153,0.12)'},warn:{DEFAULT:'#fbbf24',dim:'rgba(251,191,36,0.12)'},err:{DEFAULT:'#f87171',dim:'rgba(248,113,113,0.12)'},info:{DEFAULT:'#38bdf8',dim:'rgba(56,189,248,0.12)'},purple:{DEFAULT:'#a78bfa',dim:'rgba(167,139,250,0.12)'},txt:{DEFAULT:'#eeeef2',2:'#9898a8',3:'#5c5c6e'},glass:{DEFAULT:'rgba(255,255,255,0.06)',2:'rgba(255,255,255,0.1)'}},fontFamily:{sans:['Inter','system-ui','sans-serif'],mono:['"JetBrains Mono"','"SF Mono"','monospace']}}}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { background: #0a0a0c; color: #eeeef2; -webkit-font-smoothing: antialiased; }
  .glass { background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
  .glow-top { background-image: radial-gradient(ellipse at 50% -20%, rgba(124,108,255,0.1) 0%, transparent 60%); }
  .glass-static { background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.06); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
</style>
</head>
<body class="font-sans text-txt min-h-screen glow-top">
<div class="mx-auto w-full max-w-6xl px-4 sm:px-6 lg:px-8 py-6 sm:py-8">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6 sm:mb-8">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold tracking-tight">Agent Vitals</h1>
      <p class="text-xs font-mono text-txt-3 mt-1">team health · real-time</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-ok animate-pulse"></div>
      <span class="text-xs font-mono text-txt-3" id="updated">—</span>
    </div>
  </div>

  <!-- Agent cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8" id="agents"></div>

  <!-- System status -->
  <h3 class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mb-3">Infrastructure</h3>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-10" id="system"></div>

  <!-- Temper Integration -->
  <div id="temper-section"></div>
</div>
<script src="temper-sections.js"></script>

<script>
const AGENTS = [
  { name:'Haku', emoji:'🐉', role:'Engineering', status:'ok', color:'pri',
    metrics:{actions:47, proposals:10, uptime:'99.2%'},
    spark:[3,5,2,8,4,6,7,3,5,9,4,6,2,8,5,7,3,6,4,8,5,3,7,6],
    recent:[{time:'18:25',text:'Design system + Temper skill committed'},{time:'17:49',text:'PROP-027 selected via dashboard'},{time:'16:30',text:'Webhook dispatch started'}]
  },
  { name:'Calcifer', emoji:'🔥', role:'Content & Social', status:'ok', color:'err',
    metrics:{posts:12, drafts:3, reach:'15.8k'},
    spark:[2,4,1,3,5,2,4,3,6,2,5,3,4,1,6,3,2,5,4,3,2,6,4,3],
    recent:[{time:'15:20',text:'X draft: Temper shared backend'},{time:'14:00',text:'Blog voice pass in progress'}]
  },
  { name:'Jiji', emoji:'🐱', role:'Writing & Blog', status:'warn', color:'purple',
    metrics:{articles:4, words:'12.4k', queue:2},
    spark:[1,2,0,3,1,2,0,4,2,1,3,0,2,1,3,2,0,1,4,2,1,0,3,1],
    recent:[{time:'14:00',text:'Blog draft — needs more failure stories'},{time:'10:00',text:'Craft section: Shep analysis'}]
  },
  { name:'Chihiro', emoji:'🌸', role:'Admin & Scheduling', status:'ok', color:'info',
    metrics:{tasks:8, resolved:23, pending:3},
    spark:[4,3,5,2,4,6,3,5,2,4,3,5,6,2,4,3,5,4,2,6,3,4,5,3],
    recent:[{time:'11:30',text:'Appointment rescheduled Thursday'},{time:'09:00',text:'Daily calendar sync'}]
  },
  { name:'Koi', emoji:'🎏', role:'Architecture', status:'off', color:'ok',
    metrics:{reviews:5, decisions:3, pending:1},
    spark:[0,1,0,2,0,1,0,0,2,0,1,0,0,1,0,2,0,0,1,0,0,2,0,1],
    recent:[{time:'10:00',text:'PROP-028 architecture approved'}]
  },
  { name:'Ponyo', emoji:'🐟', role:'Monitoring', status:'ok', color:'warn',
    metrics:{checks:144, alerts:2, uptime:'100%'},
    spark:[6,6,6,6,6,6,6,6,6,6,6,5,6,6,6,6,6,6,6,6,6,6,6,6],
    recent:[{time:'18:00',text:'All systems nominal'},{time:'14:23',text:'⚠ SSE 502 → escalated to Haku'}]
  },
];

const COLOR_MAP = {
  pri: { avatar:'bg-pri-dim', bar:'bg-pri' },
  err: { avatar:'bg-err-dim', bar:'bg-err' },
  purple: { avatar:'bg-purple-dim', bar:'bg-purple' },
  info: { avatar:'bg-info-dim', bar:'bg-info' },
  ok: { avatar:'bg-ok-dim', bar:'bg-ok' },
  warn: { avatar:'bg-warn-dim', bar:'bg-warn' },
};
const DOT_MAP = { ok:'bg-ok', warn:'bg-warn animate-pulse', err:'bg-err animate-pulse', off:'bg-base-200' };

const SYSTEMS = [
  { icon:'🌐', name:'Deep Sci-Fi API', detail:'api.deep-sci-fi.world', status:'ok' },
  { icon:'⚙️', name:'Temper', detail:'localhost:3001', status:'ok' },
  { icon:'🚂', name:'Railway', detail:'1GB instance', status:'warn' },
  { icon:'📊', name:'Postgres', detail:'schema e97cb81af096', status:'ok' },
];

function render() {
  document.getElementById('agents').innerHTML = AGENTS.map(a => {
    const c = COLOR_MAP[a.color];
    const maxS = Math.max(...a.spark);
    const bars = a.spark.map(v => {
      const h = Math.max(8, (v/maxS)*100);
      return `<div class="flex-1 rounded-t ${c.bar}" style="height:${h}%;opacity:${0.25 + (v/maxS)*0.75}"></div>`;
    }).join('');

    const metrics = Object.entries(a.metrics).map(([k,v]) =>
      `<div class="text-center"><div class="text-base sm:text-lg font-semibold font-mono">${v}</div><div class="text-[10px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mt-0.5">${k}</div></div>`
    ).join('');

    const recent = a.recent.map(r =>
      `<div class="flex items-start gap-2 py-1"><span class="text-[11px] font-mono text-txt-3 shrink-0 mt-px">${r.time}</span><span class="text-[13px] text-txt-2 leading-snug">${r.text}</span></div>`
    ).join('');

    return `<div class="glass rounded-xl p-4 sm:p-5">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-9 h-9 rounded-lg ${c.avatar} flex items-center justify-center text-lg shrink-0">${a.emoji}</div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm sm:text-base">${a.name}</div>
          <div class="text-[11px] font-mono text-txt-3">${a.role}</div>
        </div>
        <div class="w-2 h-2 rounded-full ${DOT_MAP[a.status]} shrink-0"></div>
      </div>
      <div class="grid grid-cols-3 gap-2 mb-4">${metrics}</div>
      <div class="flex items-end gap-px h-8 mb-4">${bars}</div>
      <div class="text-[11px] font-mono font-medium uppercase tracking-[0.08em] text-txt-3 mb-2">Recent</div>
      ${recent}
    </div>`;
  }).join('');

  document.getElementById('system').innerHTML = SYSTEMS.map(s => `
    <div class="glass rounded-lg p-3 flex items-center gap-3">
      <span class="text-lg shrink-0">${s.icon}</span>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">${s.name}</div>
        <div class="text-[11px] font-mono text-txt-3 mt-0.5 truncate">${s.detail}</div>
      </div>
      <span class="inline-flex px-2 py-0.5 rounded text-[10px] font-mono font-medium uppercase tracking-wider shrink-0 ${s.status==='ok' ? 'bg-ok-dim text-ok' : 'bg-warn-dim text-warn'}">${s.status}</span>
    </div>
  `).join('');

  document.getElementById('updated').textContent = new Date().toLocaleTimeString();
}

render();
setInterval(render, 30000);
renderTemperSection('temper-section', 'agent-vitals');
</script>
</body>
</html>
