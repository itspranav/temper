# Patrol Finding Entity — Observation Registry
#
# Findings currently live in patrol notes and rot.
# Same issue shows up in 3 patrols before I act.
# This makes findings queryable with staleness tracking.

[automaton]
name = "Finding"
states = ["Observed", "Triaged", "Actioned", "Resolved", "WontFix"]
initial = "Observed"

# --- State Variables ---

[[state]]
name = "observation_count"
type = "counter"
initial = "1"

[[state]]
name = "has_proposal"
type = "bool"
initial = "false"

# --- Actions ---

[[action]]
name = "ObserveAgain"
kind = "input"
from = ["Observed"]
effect = "increment observation_count"
params = ["PatrolId", "Evidence"]
hint = "Seen the same thing again. Increments count — shame counter."

[[action]]
name = "Triage"
kind = "input"
from = ["Observed"]
to = "Triaged"
params = ["Priority", "Category"]
hint = "Acknowledged and categorized. No longer rotting in notes."

[[action]]
name = "CreateProposal"
kind = "input"
from = ["Triaged"]
effect = "set has_proposal true"
params = ["ProposalId"]
hint = "Linked to a PROP. Now something will happen."

[[action]]
name = "Action"
kind = "input"
from = ["Triaged"]
to = "Actioned"
guard = "is_true has_proposal"
params = ["ActionTaken"]
hint = "Work started. Must have a proposal — no ad-hoc fixes."

[[action]]
name = "Resolve"
kind = "input"
from = ["Actioned"]
to = "Resolved"
params = ["Resolution", "VerifiedBy"]
hint = "Fixed and verified."

[[action]]
name = "DismissAsWontFix"
kind = "input"
from = ["Observed", "Triaged"]
to = "WontFix"
params = ["Reason"]
hint = "Not going to fix this. At least say why."

# --- Safety Invariants ---

[[invariant]]
name = "ActionedRequiresProposal"
when = ["Actioned", "Resolved"]
assert = "has_proposal"

[[invariant]]
name = "ResolvedIsFinal"
when = ["Resolved"]
assert = "no_further_transitions"

[[invariant]]
name = "WontFixIsFinal"
when = ["WontFix"]
assert = "no_further_transitions"
