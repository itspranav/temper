# Webhook configuration for haku-ops tenant.
# Fires on proposal state changes → OpenClaw isolated agent session.

[[webhook]]
name = "openclaw-haku"
url = "http://127.0.0.1:18789/hooks/agent"
headers = { "Authorization" = "Bearer d43a532c3e1ef83771dbc77c45ff2992" }
actions = ["Select", "Deselect", "Approve", "Scratch", "WritePlan"]
entity_types = ["Proposal"]
on_success_only = true
payload_template = '{"message": "Temper webhook: ${action} on ${entity_type} ${entity_id} (${from_status} to ${to_status})", "agentId": "haku", "name": "Temper", "deliver": false, "model": "anthropic/claude-sonnet-4-6", "timeoutSeconds": 60, "allowUnsafeExternalContent": true}'
