# Deployment Entity — Push to Production Pipeline
#
# Every push triggers this. Currently I push, poll CI in a loop,
# then forget to verify. The "verified" state is the one I skip.

[automaton]
name = "Deployment"
states = ["Committed", "CIRunning", "CIPassed", "CIFailed", "Deploying", "Deployed", "Verified", "RolledBack"]
initial = "Committed"

# --- State Variables ---

[[state]]
name = "health_checked"
type = "bool"
initial = "false"

# --- Actions ---

[[action]]
name = "CIStart"
kind = "internal"
from = ["Committed"]
to = "CIRunning"
params = ["RunId", "Branch"]

[[action]]
name = "CIPass"
kind = "internal"
from = ["CIRunning"]
to = "CIPassed"
params = ["RunId", "Duration"]

[[action]]
name = "CIFail"
kind = "internal"
from = ["CIRunning"]
to = "CIFailed"
params = ["RunId", "FailureReason"]

[[action]]
name = "Deploy"
kind = "internal"
from = ["CIPassed"]
to = "Deploying"

[[action]]
name = "DeployComplete"
kind = "internal"
from = ["Deploying"]
to = "Deployed"
params = ["DeployId", "Environment"]

[[action]]
name = "HealthCheck"
kind = "input"
from = ["Deployed"]
effect = "set health_checked true"
params = ["StatusCode", "ResponseTime", "SchemaVersion"]
hint = "Hit /health, verify it responds and schema is current."

[[action]]
name = "Verify"
kind = "input"
from = ["Deployed"]
to = "Verified"
guard = "is_true health_checked"
params = ["VerifiedBy"]
hint = "Deployment confirmed working. Can't verify without health check."

[[action]]
name = "Rollback"
kind = "input"
from = ["Deployed", "Deploying"]
to = "RolledBack"
params = ["Reason"]

[[action]]
name = "Retry"
kind = "input"
from = ["CIFailed", "RolledBack"]
to = "Committed"
params = ["FixCommit"]

# --- Safety Invariants ---

[[invariant]]
name = "VerifiedRequiresHealthCheck"
when = ["Verified"]
assert = "health_checked"

[[invariant]]
name = "VerifiedIsFinal"
when = ["Verified"]
assert = "no_further_transitions"
