# Plan Entity — I/O Automaton Specification
#
# Orchestrates a collection of tasks toward a goal.
# Manages the plan lifecycle from draft through activation,
# task creation, and eventual completion or failure.
# Spawns Task child entities via the AddTask action.

[automaton]
name = "Plan"
states = ["Draft", "Active", "Paused", "Completed", "Failed"]
initial = "Draft"

# --- State Variables ---

[[state]]
name = "description"
type = "string"
initial = ""

[[state]]
name = "task_count"
type = "counter"
initial = "0"

[[state]]
name = "last_task_id"
type = "string"
initial = ""

# --- Actions: Plan Lifecycle ---

[[action]]
name = "Activate"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["description"]
hint = "Activate the plan with a description of its goal."

[[action]]
name = "AddTask"
kind = "input"
from = ["Active"]
params = ["title", "description"]
hint = "Add a new task to the active plan. Spawns a Task child entity and increments task_count."
effect = [
  { type = "spawn", entity_type = "Task", entity_id_source = "{uuid}", initial_action = "Create", store_id_in = "last_task_id" },
  { type = "increment", var = "task_count" },
  { type = "emit", event = "TaskAdded" }
]

[[action]]
name = "Pause"
kind = "input"
from = ["Active"]
to = "Paused"
hint = "Pause the plan. No new tasks can be added while paused."

[[action]]
name = "Resume"
kind = "input"
from = ["Paused"]
to = "Active"
hint = "Resume a paused plan."

[[action]]
name = "Complete"
kind = "input"
from = ["Active"]
to = "Completed"
params = ["summary"]
guard = "task_count > 0"
hint = "Mark the plan as successfully completed. Requires at least one task."
effect = [{ type = "emit", event = "PlanCompleted" }]

[[action]]
name = "Fail"
kind = "input"
from = ["Active", "Paused"]
to = "Failed"
params = ["reason"]
hint = "Mark the plan as failed from Active or Paused state."
effect = [{ type = "emit", event = "PlanFailed" }]

# --- Safety Invariants ---

[[invariant]]
name = "CompletedIsFinal"
when = ["Completed"]
assert = "no_further_transitions"

[[invariant]]
name = "FailedIsFinal"
when = ["Failed"]
assert = "no_further_transitions"
