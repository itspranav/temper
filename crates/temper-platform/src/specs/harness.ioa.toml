# Harness Entity -- I/O Automaton Specification
#
# Groups IOA specs, Cedar policies, and cross-entity rules into a
# single deployable, versionable, approvable unit. The human approves
# the harness as a whole -- not individual specs.
#
# Holds: spec_bundle, cedar_policies, intent, verification_result.
# Provides: grouping, lifecycle, versioning, audit, approval surface.

[automaton]
name = "Harness"
states = ["Draft", "Verified", "Deployed", "Paused", "Deprecated"]
initial = "Draft"

# --- State Variables ---

[[state]]
name = "name"
type = "string"
initial = ""

[[state]]
name = "intent"
type = "string"
initial = ""

[[state]]
name = "description"
type = "string"
initial = ""

[[state]]
name = "spec_bundle"
type = "string"
initial = "{}"

[[state]]
name = "cedar_policies"
type = "string"
initial = "[]"

[[state]]
name = "version"
type = "counter"
initial = "0"

[[state]]
name = "verification_result"
type = "string"
initial = ""

[[state]]
name = "created_by"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Define"
kind = "input"
from = ["Draft"]
to = "Verified"
params = ["name", "intent", "spec_bundle", "cedar_policies"]
hint = "Define the harness with specs and policies. Transitions to Verified once the bundle is set."

[[action]]
name = "Deploy"
kind = "input"
from = ["Verified"]
to = "Deployed"
params = []
hint = "Deploy the verified harness. Submits specs to platform and installs Cedar policies."
effect = [
  { type = "increment", var = "version" },
  { type = "emit", event = "HarnessDeployed" }
]

[[action]]
name = "Revise"
kind = "input"
from = ["Deployed", "Paused"]
to = "Draft"
params = ["spec_bundle", "cedar_policies"]
hint = "Revise harness specs. Goes back to Draft for re-verification."

[[action]]
name = "Pause"
kind = "input"
from = ["Deployed"]
to = "Paused"
hint = "Pause the harness. Deployed specs remain but the harness is marked inactive."

[[action]]
name = "Resume"
kind = "input"
from = ["Paused"]
to = "Deployed"
hint = "Resume a paused harness."

[[action]]
name = "Deprecate"
kind = "input"
from = ["Deployed", "Paused"]
to = "Deprecated"
params = ["reason"]
hint = "Deprecate the harness. Terminal state."
effect = [{ type = "emit", event = "HarnessDeprecated" }]

# --- Safety Invariants ---

[[invariant]]
name = "DeprecatedIsFinal"
when = ["Deprecated"]
assert = "no_further_transitions"
