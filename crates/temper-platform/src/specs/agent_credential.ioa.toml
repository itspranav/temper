# AgentCredential Entity — I/O Automaton Specification
#
# Maps a hashed API key to an AgentType and a platform-assigned instance ID.
# Agents present credentials (bearer tokens); the platform resolves them to
# verified identities. Agents never declare their own identity.
#
# See ADR-0033: Platform-Assigned Agent Identity.

[automaton]
name = "AgentCredential"
states = ["Active", "Rotated", "Revoked"]
initial = "Active"

# --- State Variables ---

[[state]]
name = "agent_type_id"
type = "string"
initial = ""

[[state]]
name = "agent_instance_id"
type = "string"
initial = ""

[[state]]
name = "key_hash"
type = "string"
initial = ""

[[state]]
name = "key_prefix"
type = "string"
initial = ""

[[state]]
name = "description"
type = "string"
initial = ""

[[state]]
name = "created_by"
type = "string"
initial = ""

[[state]]
name = "expires_at"
type = "string"
initial = ""

# --- Actions ---

[[action]]
name = "Issue"
kind = "input"
from = ["Active"]
params = ["agent_type_id", "agent_instance_id", "key_hash", "key_prefix", "description", "created_by", "expires_at"]
hint = "Issue a new agent credential linking an API key hash to an AgentType."

[[action]]
name = "Rotate"
kind = "input"
from = ["Active"]
to = "Rotated"
params = ["key_hash", "key_prefix", "description"]
hint = "Rotate this credential. The old key becomes invalid; issue a new AgentCredential for the replacement key."

[[action]]
name = "Revoke"
kind = "input"
from = ["Active", "Rotated"]
to = "Revoked"
hint = "Permanently revoke this credential. The key hash can never be used again."

# --- Safety Invariants ---

[[invariant]]
name = "ActiveRequiresKeyHash"
when = ["Active"]
assert = "key_hash != ''"

[[invariant]]
name = "ActiveRequiresAgentType"
when = ["Active"]
assert = "agent_type_id != ''"

[[invariant]]
name = "ActiveRequiresInstanceId"
when = ["Active"]
assert = "agent_instance_id != ''"
