# Postmortem Entity — I/O Automaton Specification
#
# Agent drafts a postmortem from the investigation trail.
# Humans review and may request revisions before publishing.
# Ensures root cause is documented and review is tracked.

[automaton]
name = "Postmortem"
states = ["Draft", "InReview", "Approved", "Published"]
initial = "Draft"

# --- State Variables ---

[[state]]
name = "has_root_cause"
type = "bool"
initial = "false"

[[state]]
name = "review_rounds"
type = "counter"
initial = "0"

# --- Actions: Postmortem Lifecycle ---

[[action]]
name = "AddRootCause"
kind = "input"
from = ["Draft"]
effect = "set has_root_cause true"
params = ["RootCauseDescription"]
hint = "Agent adds root cause analysis to the postmortem draft."

[[action]]
name = "SubmitForReview"
kind = "internal"
from = ["Draft"]
to = "InReview"
guard = "is_true has_root_cause"
hint = "Submit postmortem for human review. Requires root cause."

[[action]]
name = "RequestRevision"
kind = "input"
from = ["InReview"]
to = "Draft"
effect = "increment review_rounds"
params = ["Feedback"]
hint = "Human requests changes to the postmortem."

[[action]]
name = "ApprovePostmortem"
kind = "input"
from = ["InReview"]
to = "Approved"
effect = "increment review_rounds"
hint = "Human approves the postmortem after review."

[[action]]
name = "Publish"
kind = "internal"
from = ["Approved"]
to = "Published"
hint = "Publish the approved postmortem."

# --- Safety Invariants ---

[[invariant]]
name = "PublishedIsFinal"
when = ["Published"]
assert = "no_further_transitions"

[[invariant]]
name = "ReviewRequiresRootCause"
when = ["InReview", "Approved", "Published"]
assert = "has_root_cause"

[[invariant]]
name = "ApprovedHasReview"
when = ["Approved", "Published"]
assert = "review_rounds > 0"
