[package]
name = "weather-tracker"
version = "0.1.0"
edition = "2024"

[dependencies]
temper-runtime = { path = "../../crates/temper-runtime" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
